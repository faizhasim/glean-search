name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# GitHub Pages must be enabled in the repo settings (Settings → Pages → Deploy from Actions)
# for the deploy step to work.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Zensical
        run: pip install -r requirements.txt

      - name: Build site
        run: zensical build --clean

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    if: github.ref == 'refs/heads/main' && github.repository == 'faizhasim/glean-search'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/deploy-pages@v4
        id: deployment
